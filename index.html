<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ascent Quiz</title>
    <style>
        :root {
            --gold: #f1c40f;
            --bg: #0a0a1a;
            --card: #141426;
            --text: #ffffff;
        }

        body {
            font-family: 'serif', 'Georgia', Times;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #0a0a1a 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        #quiz-container {
            background: var(--card);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 30px 100px rgba(0,0,0,1);
            border: 2px solid #3d2b1f;
            outline: 1px solid var(--gold);
            outline-offset: -12px;
            text-align: center;
        }

        h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 5px; }
        .progress { color: #555; margin-bottom: 30px; font-style: italic; }

        .question { font-size: 1.5rem; margin-bottom: 30px; min-height: 80px; }

        .options { display: flex; flex-direction: column; gap: 12px; }

        button.option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            color: #ccc;
            padding: 16px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            text-align: left;
            text-transform: uppercase;
        }

        button.option-btn:hover {
            background: var(--gold);
            color: #000;
            font-weight: bold;
        }

        #result-container { display: none; }

        .visual-frame {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px auto;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .island-svg { width: 100%; height: 100%; }

        .result-title {
            font-size: 2rem;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .stats-area { margin-top: 30px; text-align: left; border-top: 1px solid #222; padding-top: 20px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.8rem; text-transform: uppercase; }
        .stat-bar-bg { background: #111; height: 8px; margin: 5px 0 12px 0; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: 1.5s ease-out; }

        /* QR CODE STYLING */
        .qr-section {
            margin-top: 30px;
            padding: 15px;
            background: white;
            display: inline-block;
            border-radius: 10px;
        }
        .qr-section p { color: black; font-size: 10px; margin: 5px 0 0 0; font-family: sans-serif; font-weight: bold; }

        .restart-btn {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>THE ASCENT QUIZ</h1>
    
    <div id="quiz-container">
        <div id="quiz-ui">
            <div class="progress" id="progress">STEP 01 OF 10</div>
            <div class="question" id="question">Loading...</div>
            <div class="options" id="options"></div>
        </div>

        <div id="result-container">
            <div class="visual-frame" id="visual-render"></div>
            <div class="result-title" id="res-name">RICH CAPITAL</div>
            
            <div class="stats-area" id="stats"></div>

            <div class="qr-section" id="qr-area">
                <img id="qr-img" src="" alt="QR Code">
                <p>SCAN TO PLAY</p>
            </div>

            <br>
            <button class="restart-btn" onclick="location.reload()">RETAKE QUIZ</button>
        </div>
    </div>

<script>
    const BIOME_DATA = {
        capital: { name: "RICH CAPITAL", color: "#f1c40f", svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#2c3e50"/><path d="M35,65 L65,65 L65,40 L35,40 Z" fill="#f5f5f5"/><circle cx="50" cy="20" r="8" fill="#f1c40f"/></svg>` },
        ocean: { name: "CRYSTAL OCEAN", color: "#3498db", svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#1a5276"/><path d="M30,50 Q50,70 70,50" fill="none" stroke="#3498db" stroke-width="4"/></svg>` },
        mine: { name: "DEEP MINES", color: "#7f8c8d", svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#111"/><rect x="45" y="40" width="10" height="20" fill="#7f8c8d"/></svg>` },
        forest: { name: "WILD FOREST", color: "#27ae60", svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#3d2b1f"/><circle cx="50" cy="45" r="18" fill="#27ae60"/></svg>` },
        desert: { name: "BURNING DESERT", color: "#e67e22", svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#935116"/><path d="M35,70 L50,40 L65,70 Z" fill="#e67e22"/></svg>` }
    };

    const questions = [
        { q: "Choose your environment:", options: [{t:"Royal Towers",b:"capital"},{t:"Floating Seas",b:"ocean"},{t:"Deep Caves",b:"mine"},{t:"Old Forests",b:"forest"},{t:"Sunlit Sand",b:"desert"}] },
        { q: "What is your goal?", options: [{t:"Power",b:"capital"},{t:"Knowledge",b:"ocean"},{t:"Riches",b:"mine"},{t:"Peace",b:"forest"},{t:"Survival",b:"desert"}] },
        { q: "Your tool of choice?", options: [{t:"Scepter",b:"capital"},{t:"Compass",b:"ocean"},{t:"Pickaxe",b:"mine"},{t:"Bow",b:"forest"},{t:"Flask",b:"desert"}] },
        { q: "Your element?", options: [{t:"Light",b:"capital"},{t:"Water",b:"ocean"},{t:"Earth",b:"mine"},{t:"Nature",b:"forest"},{t:"Fire",b:"desert"}] },
        { q: "How do others see you?", options: [{t:"Leader",b:"capital"},{t:"Explorer",b:"ocean"},{t:"Worker",b:"mine"},{t:"Guardian",b:"forest"},{t:"Nomad",b:"desert"}] },
        { q: "Favorite color?", options: [{t:"Gold",b:"capital"},{t:"Blue",b:"ocean"},{t:"Grey",b:"mine"},{t:"Green",b:"forest"},{t:"Orange",b:"desert"}] },
        { q: "Your home is...", options: [{t:"Grand",b:"capital"},{t:"Fluid",b:"ocean"},{t:"Hidden",b:"mine"},{t:"Wild",b:"forest"},{t:"Hot",b:"desert"}] },
        { q: "The Sky is...", options: [{t:"My Throne",b:"capital"},{t:"A Sea",b:"ocean"},{t:"A Lid",b:"mine"},{t:"Life",b:"forest"},{t:"A Trial",b:"desert"}] },
        { q: "Your strength?", options: [{t:"Authority",b:"capital"},{t:"Curiosity",b:"ocean"},{t:"Willpower",b:"mine"},{t:"Harmony",b:"forest"},{t:"Patience",b:"desert"}] },
        { q: "Who are you?", options: [{t:"A King",b:"capital"},{t:"A Scholar",b:"ocean"},{t:"An Artisan",b:"mine"},{t:"A Spirit",b:"forest"},{t:"A Survivor",b:"desert"}] }
    ];

    let currentIdx = 0;
    let scores = { capital:0, ocean:0, mine:0, forest:0, desert:0 };

    function load() {
        if (currentIdx >= questions.length) { show(); return; }
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `STEP ${String(currentIdx + 1).padStart(2, '0')} OF 10`;
        document.getElementById('question').innerText = q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const b = document.createElement('button');
            b.className = "option-btn";
            b.innerText = o.t;
            b.onclick = () => { scores[o.b]++; currentIdx++; load(); };
            optDiv.appendChild(b);
        });
    }

    function generateQR() {
        const currentUrl = window.location.href;
        const qrImg = document.getElementById('qr-img');
        // Utilisation de l'API Google Charts pour générer le QR Code
        qrImg.src = `https://chart.googleapis.com/chart?cht=qr&chs=150x150&chl=${encodeURIComponent(currentUrl)}`;
    }

    function show() {
        document.getElementById('quiz-ui').style.display = "none";
        document.getElementById('result-container').style.display = "block";
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        const res = BIOME_DATA[winner];
        document.getElementById('res-name').innerText = res.name;
        document.getElementById('visual-render').innerHTML = res.svg;

        // Appelle la génération du QR Code
        generateQR();

        const statDiv = document.getElementById('stats');
        statDiv.innerHTML = "";
        Object.keys(BIOME_DATA).sort((a,b) => scores[b] - scores[a]).forEach(k => {
            const p = (scores[k] / 10) * 100;
            statDiv.innerHTML += `
                <div class="stat-label"><span>${BIOME_DATA[k].name}</span><span>${p}%</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${p}%; background:${BIOME_DATA[k].color}"></div></div>
            `;
        });
    }
    load();
</script>
</body>
</html>
