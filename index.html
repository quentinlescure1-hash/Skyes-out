<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ascent Quiz</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0a0a1a; --card: #141426; --text: #ffffff; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        #quiz-container { background: var(--card); max-width: 600px; width: 100%; padding: 40px; border-radius: 8px; box-shadow: 0 30px 100px rgba(0,0,0,1); border: 2px solid #3d2b1f; outline: 1px solid var(--gold); outline-offset: -12px; text-align: center; }
        h1 { color: var(--gold); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px; }
        .progress { color: #555; margin-bottom: 30px; font-style: italic; }
        .question { font-size: 1.5rem; margin-bottom: 30px; min-height: 80px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        button.option-btn { background: rgba(255,255,255,0.03); border: 1px solid #333; color: #ccc; padding: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button.option-btn:hover { background: var(--gold); color: #000; font-weight: bold; }
        #result-container { display: none; }
        .visual-frame { width: 180px; height: 180px; margin: 0 auto 20px auto; background: #000; border: 3px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .island-svg { width: 100%; height: 100%; }
        .result-title { font-size: 2rem; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
        .stats-area { margin-top: 30px; text-align: left; border-top: 1px solid #222; padding-top: 20px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.8rem; text-transform: uppercase; }
        .stat-bar-bg { background: #111; height: 8px; margin: 5px 0 12px 0; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: 1.5s ease-out; }
        .qr-section { margin-top: 30px; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
        .qr-section p { color: black; font-size: 10px; margin: 5px 0 0 0; font-family: sans-serif; font-weight: bold; }
        #qr-img { width: 150px; height: 150px; display: block; }
        .restart-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>THE ASCENT QUIZ</h1>
    
    <div id="quiz-container">
        <div id="quiz-ui">
            <div class="progress" id="progress">STEP 01 OF 10</div>
            <div class="question" id="question">Loading...</div>
            <div class="options" id="options"></div>
        </div>

        <div id="result-container">
            <div class="visual-frame" id="visual-render"></div>
            <div class="result-title" id="res-name"></div>
            <div class="stats-area" id="stats"></div>
            <div class="qr-section">
                <img id="qr-img" src="" alt="QR Code">
                <p>SCAN TO CHALLENGE A FRIEND</p>
            </div>
            <br>
            <button class="restart-btn" onclick="location.reload()">RETAKE JOURNEY</button>
        </div>
    </div>

    <script>
        const BIOME_DATA = {
            capital: { name: "RICH CAPITAL", color: "#f1c40f", svg: `<svg viewBox="0 0 100 100"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#2c3e50"/><path d="M35,65 L65,65 L65,40 L35,40 Z" fill="#f5f5f5"/><circle cx="50" cy="20" r="8" fill="#f1c40f"/></svg>` },
            ocean: { name: "CRYSTAL OCEAN", color: "#3498db", svg: `<svg viewBox="0 0 100 100"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#1a5276"/><path d="M30,50 Q50,70 70,50" fill="none" stroke="#3498db" stroke-width="4"/></svg>` },
            mine: { name: "DEEP MINES", color: "#7f8c8d", svg: `<svg viewBox="0 0 100 100"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#111"/><rect x="45" y="40" width="10" height="20" fill="#7f8c8d"/></svg>` },
            forest: { name: "WILD FOREST", color: "#27ae60", svg: `<svg viewBox="0 0 100 100"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#3d2b1f"/><circle cx="50" cy="45" r="18" fill="#27ae60"/></svg>` },
            desert: { name: "BURNING DESERT", color: "#e67e22", svg: `<svg viewBox="0 0 100 100"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#935116"/><path d="M35,70 L50,40 L65,70 Z" fill="#e67e22"/></svg>` }
        };

        const questions = [
            { q: "Choose your primary environment:", options: [{t:"Golden Spires",b:"capital"},{t:"Floating Reefs",b:"ocean"},{t:"Deep Caverns",b:"mine"},{t:"Ancient Woods",b:"forest"},{t:"Silent Dunes",b:"desert"}] },
            { q: "What is your main tool?", options: [{t:"Scepter",b:"capital"},{t:"Compass",b:"ocean"},{t:"Pickaxe",b:"mine"},{t:"Bow",b:"forest"},{t:"Flask",b:"desert"}] },
            { q: "What drives you?", options: [{t:"Perfection",b:"capital"},{t:"Discovery",b:"ocean"},{t:"Wealth",b:"mine"},{t:"Balance",b:"forest"},{t:"Survival",b:"desert"}] },
            { q: "Your favorite color palette?", options: [{t:"Gold & White",b:"capital"},{t:"Azure & Blue",b:"ocean"},{t:"Grey & Iron",b:"mine"},{t:"Green & Brown",b:"forest"},{t:"Orange & Sand",b:"desert"}] },
            { q: "Pick an element:", options: [{t:"Light",b:"capital"},{t:"Water",b:"ocean"},{t:"Earth",b:"mine"},{t:"Nature",b:"forest"},{t:"Fire",b:"desert"}] },
            { q: "Your ideal home is...", options: [{t:"Inaccessible",b:"capital"},{t:"Vast",b:"ocean"},{t:"Deep",b:"mine"},{t:"Wild",b:"forest"},{t:"Harsh",b:"desert"}] },
            { q: "How do you handle a crisis?", options: [{t:"By Decree",b:"capital"},{t:"Adaptation",b:"ocean"},{t:"Hard Work",b:"mine"},{t:"Harmony",b:"forest"},{t:"Resilience",b:"desert"}] },
            { q: "What do you seek in the sky?", options: [{t:"My Kingdom",b:"capital"},{t:"Infinite Road",b:"ocean"},{t:"A Lid to Break",b:"mine"},{t:"Life-giving Rain",b:"forest"},{t:"Burning Heat",b:"desert"}] },
            { q: "Choose a treasure:", options: [{t:"The Crown",b:"capital"},{t:"Rare Map",b:"ocean"},{t:"Raw Diamond",b:"mine"},{t:"Sacred Fruit",b:"forest"},{t:"Peace of Mind",b:"desert"}] },
            { q: "Who are you at your core?", options: [{t:"A Leader",b:"capital"},{t:"An Explorer",b:"ocean"},{t:"An Artisan",b:"mine"},{t:"A Guardian",b:"forest"},{t:"A Survivor",b:"desert"}] }
        ];

        let currentIdx = 0;
        let scores = { capital:0, ocean:0, mine:0, forest:0, desert:0 };

        function load() {
            if (currentIdx >= questions.length) { show(); return; }
            const q = questions[currentIdx];
            document.getElementById('progress').innerText = `STEP ${String(currentIdx + 1).padStart(2, '0')} OF 10`;
            document.getElementById('question').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            q.options.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn";
                b.innerText = o.t;
                b.onclick = () => { scores[o.b]++; currentIdx++; load(); };
                optDiv.appendChild(b);
            });
        }

        function show() {
            document.getElementById('quiz-ui').style.display = "none";
            document.getElementById('result-container').style.display = "block";
            const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const res = BIOME_DATA[winner];
            document.getElementById('res-name').innerText = res.name;
            document.getElementById('visual-render').innerHTML = res.svg;
            
            // GENERATION QR CODE
            const qrImg = document.getElementById('qr-img');
            qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(window.location.href);

            const statDiv = document.getElementById('stats');
            statDiv.innerHTML = "";
            Object.keys(BIOME_DATA).sort((a,b) => scores[b] - scores[a]).forEach(k => {
                const p = (scores[k] / 10) * 100;
                statDiv.innerHTML += `<div class="stat-label"><span>${BIOME_DATA[k].name}</span><span>${p}%</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${p}%; background:${BIOME_DATA[k].color}"></div></div>`;
            });
        }
        load();
    </script>
</body>
</html>
