<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ascent Quiz</title>
    <style>
        :root {
            --gold: #f1c40f;
            --bg: #0a0a1a;
            --card: #141426;
            --text: #ffffff;
            --border-gold: #d4af37;
        }

        body {
            font-family: 'serif', 'Georgia', Times;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #0a0a1a 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        #quiz-container {
            background: var(--card);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 30px 100px rgba(0,0,0,1);
            border: 2px solid #3d2b1f;
            outline: 1px solid var(--gold);
            outline-offset: -12px;
            text-align: center;
        }

        h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 5px; }
        .progress { color: #555; margin-bottom: 30px; font-style: italic; letter-spacing: 2px; }

        .question { font-size: 1.5rem; margin-bottom: 30px; min-height: 80px; line-height: 1.4; }

        .options { display: flex; flex-direction: column; gap: 12px; }

        button.option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            color: #ccc;
            padding: 16px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            text-align: left;
            text-transform: uppercase;
            border-radius: 4px;
        }

        button.option-btn:hover {
            background: var(--gold);
            color: #000;
            transform: translateX(5px);
            font-weight: bold;
        }

        #result-container { display: none; }

        .visual-frame {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px auto;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 0 30px rgba(241,196,15,0.2);
        }

        .island-svg { width: 100%; height: 100%; }

        .result-title {
            font-size: 2rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        .stats-area { margin-top: 30px; text-align: left; border-top: 1px solid #222; padding-top: 20px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.85rem; text-transform: uppercase; }
        .stat-bar-bg { background: #111; height: 8px; margin: 6px 0 15px 0; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: 1.5s ease-out; }

        .restart-btn {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        .restart-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <h1>THE ASCENT QUIZ</h1>
    
    <div id="quiz-container">
        <div id="quiz-ui">
            <div class="progress" id="progress">STEP 01 OF 10</div>
            <div class="question" id="question">Determining your path...</div>
            <div class="options" id="options"></div>
        </div>

        <div id="result-container">
            <div class="visual-frame" id="visual-render"></div>
            <div class="result-title" id="res-name">RICH CAPITAL</div>
            <div class="stats-area" id="stats"></div>
            <button class="restart-btn" onclick="location.reload()">RETAKE QUIZ</button>
        </div>
    </div>

<script>
    const BIOME_DATA = {
        capital: { 
            name: "RICH CAPITAL", color: "#f1c40f", 
            svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#2c3e50"/><path d="M35,65 L65,65 L65,40 L35,40 Z" fill="#f5f5f5"/><path d="M50,40 L50,20 M40,30 L60,30" stroke="#f1c40f" stroke-width="3"/><circle cx="50" cy="15" r="5" fill="#f1c40f"/></svg>` 
        },
        ocean: { 
            name: "CRYSTAL OCEAN", color: "#3498db", 
            svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#1a5276"/><path d="M30,50 Q50,70 70,50 T90,50" fill="none" stroke="#3498db" stroke-width="4"/><circle cx="50" cy="40" r="15" fill="#3498db" opacity="0.5"/></svg>` 
        },
        mine: { 
            name: "DEEP MINES", color: "#7f8c8d", 
            svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#111"/><path d="M40,55 L60,55 L50,30 Z" fill="#7f8c8d"/><rect x="48" y="55" width="4" height="15" fill="#333"/></svg>` 
        },
        forest: { 
            name: "WILD FOREST", color: "#27ae60", 
            svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M20,70 L50,85 L80,70 L50,55 Z" fill="#3d2b1f"/><circle cx="50" cy="45" r="18" fill="#27ae60"/><circle cx="65" cy="40" r="12" fill="#2ecc71" opacity="0.7"/></svg>` 
        },
        desert: { 
            name: "BURNING DESERT", color: "#e67e22", 
            svg: `<svg viewBox="0 0 100 100" class="island-svg"><path d="M15,70 L50,85 L85,70 L50,55 Z" fill="#935116"/><path d="M30,70 L50,35 L70,70 Z" fill="#e67e22"/><circle cx="80" cy="25" r="8" fill="#f1c40f"/></svg>` 
        }
    };

    const questions = [
        { q: "Choose your preferred landscape:", options: [{t:"White Marble Towers",b:"capital"},{t:"Floating Reefs",b:"ocean"},{t:"Endless Caves",b:"mine"},{t:"Lush Greenery",b:"forest"},{t:"Golden Dunes",b:"desert"}] },
        { q: "What is your greatest asset?", options: [{t:"Political Power",b:"capital"},{t:"Adaptability",b:"ocean"},{t:"Raw Strength",b:"mine"},{t:"Natural Harmony",b:"forest"},{t:"Endurance",b:"desert"}] },
        { q: "Which tool do you trust?", options: [{t:"A Royal Scepter",b:"capital"},{t:"A Sailor's Compass",b:"ocean"},{t:"A Heavy Pickaxe",b:"mine"},{t:"A Hunting Bow",b:"forest"},{t:"A Survival Flask",b:"desert"}] },
        { q: "Where do you find peace?", options: [{t:"High Above All",b:"capital"},{t:"Lost at Sea",b:"ocean"},{t:"Deep Underground",b:"mine"},{t:"Within the Trees",b:"forest"},{t:"Under the Sun",b:"desert"}] },
        { q: "What is your main motivation?", options: [{t:"Control",b:"capital"},{t:"Discovery",b:"ocean"},{t:"Wealth",b:"mine"},{t:"Protection",b:"forest"},{t:"Survival",b:"desert"}] },
        { q: "Choose an element:", options: [{t:"Light",b:"capital"},{t:"Water",b:"ocean"},{t:"Earth",b:"mine"},{t:"Wind",b:"forest"},{t:"Fire",b:"desert"}] },
        { q: "Your ideal home is...", options: [{t:"Fortified",b:"capital"},{t:"Shifting",b:"ocean"},{t:"Enclosed",b:"mine"},{t:"Wild",b:"forest"},{t:"Vast",b:"desert"}] },
        { q: "How do others see you?", options: [{t:"A Leader",b:"capital"},{t:"An Explorer",b:"ocean"},{t:"A Worker",b:"mine"},{t:"A Guardian",b:"forest"},{t:"A Nomad",b:"desert"}] },
        { q: "The Sky represents...", options: [{t:"My Kingdom",b:"capital"},{t:"Infinite Freedom",b:"ocean"},{t:"A Ceiling",b:"mine"},{t:"Breath of Life",b:"forest"},{t:"A Burning Trial",b:"desert"}] },
        { q: "What do you value most?", options: [{t:"Legacy",b:"capital"},{t:"Curiosity",b:"ocean"},{t:"Results",b:"mine"},{t:"Peace",b:"forest"},{t:"Resilience",b:"desert"}] }
    ];

    let currentIdx = 0;
    let scores = { capital:0, ocean:0, mine:0, forest:0, desert:0 };

    function load() {
        if (currentIdx >= questions.length) { show(); return; }
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `STEP ${String(currentIdx + 1).padStart(2, '0')} OF 10`;
        document.getElementById('question').innerText = q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const b = document.createElement('button');
            b.className = "option-btn";
            b.innerText = o.t;
            b.onclick = () => { scores[o.b]++; currentIdx++; load(); };
            optDiv.appendChild(b);
        });
    }

    function show() {
        document.getElementById('quiz-ui').style.display = "none";
        document.getElementById('result-container').style.display = "block";
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        const res = BIOME_DATA[winner];
        document.getElementById('res-name').innerText = res.name;
        document.getElementById('visual-render').innerHTML = res.svg;

        const statDiv = document.getElementById('stats');
        statDiv.innerHTML = "";
        
        Object.keys(BIOME_DATA).sort((a,b) => scores[b] - scores[a]).forEach(k => {
            const p = (scores[k] / 10) * 100;
            statDiv.innerHTML += `
                <div class="stat-label"><span>${BIOME_DATA[k].name}</span><span>${p}%</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${p}%; background:${BIOME_DATA[k].color}"></div></div>
            `;
        });
    }
    load();
</script>
</body>
</html>
